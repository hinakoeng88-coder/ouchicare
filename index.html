<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="おうちケア">
<title>おうちケア</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=DM+Serif+Display&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#EEF4FB;--ww:#F5F9FF;--blue:#4A7DBF;--bluedark:#2C5A99;--bluepale:#D8E8F8;--acc:#C4714A;--accl:#E8C4A0;--ch:#3A2A1A;--mg:#6B7A8A;--bd:#C8D8EC;--dbg:#E8F2E8;--dt:#6A9A6A;--late:#E8923A;--latebg:#FFEEDC;--sh:rgba(44,80,140,0.08)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--ch);min-height:100vh}
.hdr{background:var(--ww);border-bottom:1px solid var(--bd);padding:calc(env(safe-area-inset-top, 20px) + 20px) 20px 12px;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.apptitle{font-family:'DM Serif Display',serif;font-size:24px;color:var(--bluedark)}
.datelabel{font-size:11px;color:var(--mg);font-weight:500}
.pb-wrap{background:var(--bluepale);border-radius:99px;height:5px;margin-top:8px;overflow:hidden}
.pb-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--bluedark));border-radius:99px;transition:width .5s ease}
.pb-lbl{font-size:10px;color:var(--mg);margin-top:4px;text-align:right}
.tabs{display:flex;background:var(--ww);border-bottom:1px solid var(--bd);padding:0 16px;position:sticky;top:calc(env(safe-area-inset-top, 20px) + 70px);z-index:99}
.tab{flex:1;padding:9px 4px;text-align:center;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--mg);cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;transition:all .2s}
.tab.active{color:var(--bluedark);border-bottom-color:var(--bluedark)}
.main{padding:16px;padding-bottom:90px}
.page{display:none}.page.active{display:block;animation:fd .25s ease}
@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.reset-bar{background:var(--ww);border-radius:14px;padding:9px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px;box-shadow:0 1px 6px var(--sh);border:1px solid var(--bd)}
.reset-bar-icon{font-size:18px}.reset-bar-text{flex:1;font-family:'Nunito',sans-serif;font-size:11px;color:var(--mg);font-weight:600}
.reset-bar-sub{font-size:9px;color:#A0B8D0;display:block;margin-top:1px}
.reset-btn{font-size:16px;background:linear-gradient(135deg,#E8C4A0,#C4714A);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(196,113,74,.3);flex-shrink:0}
.cat-block{margin-bottom:10px;border-radius:12px;overflow:hidden;box-shadow:0 1px 6px var(--sh)}
.cat-hdr{display:flex;align-items:center;gap:7px;padding:9px 12px;cursor:pointer;-webkit-user-select:none;user-select:none}
.cat-icon{font-size:15px}.cat-name{font-size:12px;font-weight:700;flex:1}.cat-cnt{font-size:10px;color:var(--mg)}
.cat-arrow{font-size:11px;color:var(--mg);transition:transform .25s;margin-left:2px}.cat-arrow.open{transform:rotate(180deg)}
.cat-body{overflow:hidden;max-height:0;opacity:0;background:var(--ww);padding:0 8px;transition:max-height .3s ease,opacity .25s ease}
.cat-body.open{max-height:1400px;opacity:1;padding:6px 8px 8px}
.ch-daily{background:#D6ECFF}.cn-daily{color:#1A5A99}.ch-wd{background:#DCF0FF}.cn-wd{color:#1A6A99}
.ch-sat{background:#D6EED6}.cn-sat{color:#2A6A2A}.ch-sun{background:#FFE4E4}.cn-sun{color:#993A2A}
.ch-weekend{background:#E4D8F8}.cn-weekend{color:#5A3A99}.ch-monthstart{background:#D4F0F8}.cn-monthstart{color:#1A6A8A}
.ch-lastsat{background:#FFF0D8}.cn-lastsat{color:#8A5A1A}.ch-lastsat3m{background:#FFE8D8}.cn-lastsat3m{color:#9A4A1A}
.ch-special{background:#EDE8F8}.cn-special{color:#4A3A99}
.tw{position:relative;overflow:hidden;border-radius:10px;margin-bottom:6px}
.del-bg{position:absolute;right:0;top:0;bottom:0;width:60px;background:#FF4D4D;display:flex;align-items:center;justify-content:center;font-size:16px;border-radius:0 10px 10px 0}
.tc2{background:var(--ww);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;border:1px solid var(--bd);cursor:pointer;position:relative;z-index:1;transform:translateX(0);transition:all .25s;-webkit-user-select:none;user-select:none}
.tc2:active{transform:scale(.97)}
.tc2.done{background:var(--dbg);border-color:#A8D8A8}.tc2.late{background:var(--latebg);border-color:#F0C088}
.tc2.done .tn,.tc2.late .tn{text-decoration:line-through}.tc2.done .tn{color:var(--dt)}.tc2.late .tn{color:#B8702A}
.chk{width:21px;height:21px;border-radius:50%;border:2px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--ww);transition:all .25s}
.tc2.done .chk{background:#6AAA6A;border-color:#6AAA6A}.tc2.late .chk{background:var(--late);border-color:var(--late)}
.chk svg{opacity:0;transform:scale(.5);transition:all .2s}.tc2.done .chk svg,.tc2.late .chk svg{opacity:1;transform:scale(1)}
.ti{flex:1;min-width:0}.tn{font-size:13px;font-weight:500;line-height:1.3;color:var(--ch);transition:all .25s}.tm2{font-size:10px;color:var(--mg);margin-top:1px}
.late-badge{font-size:9px;font-weight:700;color:var(--late);background:#fff;border:1px solid #F0C088;border-radius:99px;padding:2px 8px;cursor:pointer;flex-shrink:0}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav button{background:var(--ww);border:1.5px solid var(--bd);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:18px;color:var(--mg);display:flex;align-items:center;justify-content:center}
.cal-month{font-family:'DM Serif Display',serif;font-size:18px;color:var(--bluedark)}
.cal-hint{font-size:10px;color:var(--mg);text-align:center;margin-bottom:10px;background:var(--bluepale);border-radius:8px;padding:7px;line-height:1.6}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--mg);padding:4px 0}
.cal-dow.sun{color:#993A2A}.cal-dow.sat{color:#2A6A2A}
.cal-day{text-align:center;padding:4px 2px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;min-height:40px;display:flex;flex-direction:column;align-items:center;gap:2px;justify-content:center;transition:all .2s}
.cal-day:hover{background:var(--bluepale)}.cal-day.today-d{background:var(--bluedark);color:#fff;font-weight:700}
.cal-day.today-d .dnum{color:#fff}.cal-day.selected-d{background:var(--bluepale);outline:2px solid var(--blue)}.cal-day.empty{cursor:default}
.dnum{font-size:13px;line-height:1}.dots{display:flex;gap:2px;height:5px}.dot{width:5px;height:5px;border-radius:50%}
.dot.d-done{background:#6AAA6A}.dot.d-late{background:var(--late)}
.cal-day.today-d .dot.d-done{background:#B8F0B8}.cal-day.today-d .dot.d-late{background:#FFD0A0}
.cal-detail{background:var(--ww);border-radius:12px;padding:13px 15px;box-shadow:0 1px 6px var(--sh)}
.cal-dtitle{font-size:14px;font-weight:700;color:var(--bluedark);margin-bottom:3px}
.cal-dsub{font-size:10px;color:var(--mg);margin-bottom:10px}
.cal-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--bd);cursor:pointer}
.cal-row:last-child{border-bottom:none}.cal-row:active{opacity:.6}
.cchk{width:18px;height:18px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.cchk.dc{background:#6AAA6A}.cchk.lc{background:var(--late)}.cchk.uc{background:var(--ww);border:1.5px solid var(--bd)}
.ctname{font-size:13px;flex:1;color:var(--ch)}.ctname.done-t{text-decoration:line-through;color:var(--dt)}.ctname.late-t{text-decoration:line-through;color:#B8702A}
.cbadge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700}
.late-note{font-size:9px;color:var(--late);font-weight:700;display:block;margin-top:1px}
.no-detail{text-align:center;padding:22px;font-size:12px;color:var(--mg)}
.memo-form{background:var(--ww);border-radius:12px;padding:13px 15px;margin-bottom:14px;box-shadow:0 1px 6px var(--sh)}
.memo-form textarea,.memo-form input{width:100%;border:1.5px solid var(--bd);border-radius:9px;padding:10px 12px;font-family:inherit;color:var(--ch);background:#EEF3FA;outline:none;resize:none}
.memo-form textarea{font-size:13px;height:76px}.memo-form input{font-size:12px;margin-top:7px}
.memo-add-btn{margin-top:9px;width:100%;padding:11px;border-radius:9px;background:var(--bluedark);color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.memo-card{background:var(--ww);border-radius:11px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 6px var(--sh);position:relative;border:1px solid var(--bd)}
.memo-card-text{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-all}.memo-card-date{font-size:10px;color:var(--mg);margin-top:5px}
.memo-del{position:absolute;top:10px;right:11px;background:none;border:none;font-size:17px;cursor:pointer;color:var(--mg)}
.memo-empty,.empty-state{text-align:center;padding:36px 16px;font-size:12px;color:var(--mg)}
.fab{position:fixed;bottom:24px;right:20px;z-index:200;width:54px;height:54px;border-radius:50%;background:#DDE6F0;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(44,90,153,.2)}
.fab-plus{font-size:36px;line-height:1;color:#3A2A1A;font-weight:300;margin-top:-2px;pointer-events:none}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end}.ov.open{display:flex}
.sheet{background:var(--ww);width:100%;max-width:430px;margin:0 auto;border-radius:22px 22px 0 0;padding:18px 18px 44px;max-height:90vh;overflow-y:auto}
.sh-hnd{width:34px;height:4px;background:var(--bd);border-radius:99px;margin:0 auto 18px}
.sh-title{font-family:'DM Serif Display',serif;font-size:19px;color:var(--bluedark);margin-bottom:16px}
.fr{margin-bottom:12px}.fl{font-size:10px;font-weight:700;color:var(--mg);letter-spacing:.06em;margin-bottom:6px;display:block}
.fi{width:100%;padding:11px 13px;border:1.5px solid var(--bd);border-radius:10px;font-family:inherit;font-size:14px;background:#EEF3FA;color:var(--ch);outline:none}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.cat-chip{padding:9px 4px;border-radius:10px;border:1.5px solid var(--bd);background:#EEF3FA;font-family:inherit;font-size:11px;font-weight:600;color:var(--mg);cursor:pointer;text-align:center;line-height:1.4}
.cat-chip.sel{background:var(--bluedark);border-color:var(--bluedark);color:#fff}.cat-chip .chip-icon{font-size:14px;display:block;margin-bottom:2px}
.bp{width:100%;padding:13px;border-radius:11px;background:linear-gradient(135deg,var(--blue),var(--bluedark));color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;margin-top:7px}
.popup{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;display:none;align-items:center;justify-content:center;padding:20px}.popup.open{display:flex}
.popup-box{background:#fff;border-radius:16px;padding:22px;max-width:300px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.2)}
.popup-icon{font-size:34px;margin-bottom:8px}.popup-title{font-size:15px;font-weight:700;color:var(--ch);margin-bottom:7px}
.popup-text{font-size:14px;color:var(--late);font-weight:700;margin-bottom:16px}
.popup-close{padding:9px 24px;border-radius:99px;background:var(--bluedark);color:#fff;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-top"><div class="apptitle">おうちケア</div><div class="datelabel" id="dlbl"></div></div><div class="pb-wrap"><div class="pb-fill" id="pbf" style="width:0%"></div></div><div class="pb-lbl" id="pbl">読み込み中...</div></div>
<div class="tabs"><button class="tab active" data-page="today">📋 今日</button><button class="tab" data-page="record">📅 記録</button><button class="tab" data-page="memo">📝 メモ</button></div>
<div class="main">
  <div class="page active" id="page-today"><div class="reset-bar"><span class="reset-bar-icon">🧹</span><div class="reset-bar-text">今日のチェックをリセット<span class="reset-bar-sub">タップするとすべて未完了に戻ります</span></div><button class="reset-btn" onclick="resetToday()">✨</button></div><div id="todayList"></div></div>
  <div class="page" id="page-record"><div class="cal-nav"><button onclick="calPrev()">‹</button><div class="cal-month" id="calMonthLbl"></div><button onclick="calNext()">›</button></div><div class="cal-hint">💡 日付をタップ → その日の家事に後からチェックできます<br>🟢 当日完了　🟠 別の日に実施</div><div class="cal-grid" id="calGrid"></div><div id="calDetail"></div></div>
  <div class="page" id="page-memo"><div class="memo-form"><textarea id="memoText" placeholder="お掃除メモを入力"></textarea><input id="memoUrl" placeholder="URL（任意）"><button class="memo-add-btn" onclick="addMemo()">メモを保存</button></div><div id="memoList"></div></div>
</div>
<button class="fab" id="fabBtn" onclick="openSheet()"><span class="fab-plus">+</span></button>
<div class="ov" id="ov" onclick="handleOv(event)"><div class="sheet"><div class="sh-hnd"></div><div class="sh-title">新しい家事</div><div class="fr"><label class="fl">家事の名前</label><input class="fi" id="iName" placeholder="例：洗濯機を回す" maxlength="30"></div><div class="fr"><label class="fl">メモ（任意）</label><input class="fi" id="iNote" placeholder="例：タオル類も忘れずに" maxlength="40"></div><div class="fr"><label class="fl">カテゴリ</label><div class="cat-grid" id="catChipGrid"></div></div><button class="bp" onclick="addTask()">追加する ✦</button></div></div>
<div class="popup" id="popup" onclick="if(event.target===this)closePopup()"><div class="popup-box"><div class="popup-icon">📌</div><div class="popup-title" id="popupTitle"></div><div class="popup-text" id="popupText"></div><button class="popup-close" onclick="closePopup()">閉じる</button></div></div>
<script>
const WD=['日','月','火','水','木','金','土'];
const CATS={daily:{label:'毎日の家事',icon:'🌅',hc:'ch-daily',nc:'cn-daily',bg:'#D6ECFF',col:'#1A5A99'},mon:{label:'月曜日の家事',icon:'📅',hc:'ch-wd',nc:'cn-wd',bg:'#DCF0FF',col:'#1A6A99'},tue:{label:'火曜日の家事',icon:'📅',hc:'ch-wd',nc:'cn-wd',bg:'#DCF0FF',col:'#1A6A99'},wed:{label:'水曜日の家事',icon:'📅',hc:'ch-wd',nc:'cn-wd',bg:'#DCF0FF',col:'#1A6A99'},thu:{label:'木曜日の家事',icon:'📅',hc:'ch-wd',nc:'cn-wd',bg:'#DCF0FF',col:'#1A6A99'},fri:{label:'金曜日の家事',icon:'📅',hc:'ch-wd',nc:'cn-wd',bg:'#DCF0FF',col:'#1A6A99'},sat:{label:'土曜日の家事',icon:'📅',hc:'ch-sat',nc:'cn-sat',bg:'#D6EED6',col:'#2A6A2A'},sun:{label:'日曜日の家事',icon:'📅',hc:'ch-sun',nc:'cn-sun',bg:'#FFE4E4',col:'#993A2A'},weekend:{label:'週末の家事',icon:'🌿',hc:'ch-weekend',nc:'cn-weekend',bg:'#E4D8F8',col:'#5A3A99'},monthstart:{label:'月初の家事',icon:'🌱',hc:'ch-monthstart',nc:'cn-monthstart',bg:'#D4F0F8',col:'#1A6A8A'},lastsat:{label:'毎月最終土曜の家事',icon:'🗓',hc:'ch-lastsat',nc:'cn-lastsat',bg:'#FFF0D8',col:'#8A5A1A'},lastsat3m:{label:'３ヶ月ごと最終土曜',icon:'📦',hc:'ch-lastsat3m',nc:'cn-lastsat3m',bg:'#FFE8D8',col:'#9A4A1A'},special:{label:'臨時の家事',icon:'⚡',hc:'ch-special',nc:'cn-special',bg:'#EDE8F8',col:'#4A3A99'}};
const ORDER=['daily','mon','tue','wed','thu','fri','sat','sun','weekend','monthstart','lastsat','lastsat3m','special'];
function isLastSat(d){if(d.getDay()!==6)return false;const n=new Date(d);n.setDate(d.getDate()+7);return n.getMonth()!==d.getMonth();}
function isLastSat3(d){return isLastSat(d)&&(d.getMonth()+1)%3===1;}
let catOpen={};ORDER.forEach(k=>catOpen[k]=true);
let tasks=[],checks={},memos=[],selFreq='daily';
const now=new Date(),todayKey=dk(now),dow=now.getDay();
let calYear=now.getFullYear(),calMonth=now.getMonth(),calSelKey=todayKey;
function dk(d){return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}
function parseKey(k){const p=k.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function fmtKey(k){const p=k.split('-');return `${p[1]}月${p[2]}日`;}
function uid(){return Math.random().toString(36).slice(2,10);}
function save(){localStorage.setItem('vT',JSON.stringify(tasks));localStorage.setItem('vC',JSON.stringify(checks));localStorage.setItem('vM',JSON.stringify(memos));}
function load(){tasks=JSON.parse(localStorage.getItem('vT')||'[]');checks=JSON.parse(localStorage.getItem('vC')||'{}');memos=JSON.parse(localStorage.getItem('vM')||'[]');if(!tasks.length)seed();}
function seed(){[{n:'床掃除',f:'daily'},{n:'乾燥機フィルター',f:'daily'},{n:'レモチェア拭く',f:'daily'},{n:'プラごみ確認',f:'mon'},{n:'ビンカンor不燃ゴミ確認',f:'tue'},{n:'燃えるゴミ確認',f:'wed'},{n:'シンク排水溝ネット交換',f:'wed'},{n:'植物お水',f:'wed'},{n:'洗濯機の排水フィルター',f:'sat'},{n:'掃除機',f:'sat'},{n:'シンク掃除',f:'sat'},{n:'トイレ掃除',f:'sat'},{n:'シーツ交換',f:'sat'},{n:'枕カバー交換',f:'sat'},{n:'燃えるゴミ確認',f:'sun'},{n:'シンク排水溝ネット交換',f:'sun'},{n:'植物お水',f:'sun'},{n:'乾燥パッキン',f:'sun'},{n:'玄関掃除',f:'sun'},{n:'お風呂の髪の毛',f:'sun'},{n:'洗濯槽洗浄',f:'lastsat'},{n:'防カビ',f:'lastsat3m'}].forEach(x=>tasks.push({id:uid(),name:x.n,note:'',freq:x.f}));save();}
function getCat(id){return CATS[id]||{label:id,icon:'📋',bg:'#FFF3D8',col:'#8A6A1A',hc:'ch-daily',nc:'cn-daily'};}
function ck(id,key){return id+'_'+key;}
function getDoneDate(id,key){return checks[ck(id,key)]||null;}
function isActiveOn(t,d){const dw=d.getDay(),dm=d.getDate();switch(t.freq){case'daily':return true;case'mon':return dw===1;case'tue':return dw===2;case'wed':return dw===3;case'thu':return dw===4;case'fri':return dw===5;case'sat':return dw===6;case'sun':return dw===0;case'weekend':return dw===0||dw===6;case'monthstart':return dm<=3;case'lastsat':return isLastSat(d);case'lastsat3m':return isLastSat3(d);case'special':return true;default:return true;}}
function isActiveToday(t){return isActiveOn(t,now);}
function renderToday(){let html='',total=0,done=0;ORDER.forEach(freq=>{const list=tasks.filter(t=>t.freq===freq&&isActiveToday(t));if(!list.length)return;const cat=getCat(freq),dc=list.filter(t=>getDoneDate(t.id,todayKey)).length;total+=list.length;done+=dc;const isOpen=catOpen[freq]!==false;html+=`<div class="cat-block"><div class="cat-hdr ${cat.hc}" onclick="toggleCatOpen('${freq}')"><span class="cat-icon">${cat.icon}</span><span class="cat-name ${cat.nc}">${cat.label}</span><span class="cat-cnt">${dc}/${list.length}</span><span class="cat-arrow${isOpen?' open':''}" id="catarrow-${freq}">▼</span></div><div class="cat-body${isOpen?' open':''}" id="catbody-${freq}">${list.map(t=>cardToday(t)).join('')}</div></div>`;});if(!html)html=`<div class="empty-state">🎉<br>今日のタスクはありません</div>`;document.getElementById('todayList').innerHTML=html;const pct=total?Math.round(done/total*100):0;document.getElementById('pbf').style.width=pct+'%';document.getElementById('pbl').textContent=total?`今日 ${done} / ${total} 完了 (${pct}%)`:'タスクなし';document.getElementById('dlbl').textContent=`${now.getMonth()+1}月${now.getDate()}日（${WD[dow]}）`;initSwipe();}
function cardToday(t){const dd=getDoneDate(t.id,todayKey),isDone=!!dd,isLate=isDone&&dd!==todayKey;const cls=isLate?'late':(isDone?'done':'');const nt=t.note?`<div class="tm2">${t.note}</div>`:'';const badge=isLate?`<span class="late-badge" onclick="event.stopPropagation();showActual('${t.name}','${dd}')">${fmtKey(dd)}実施</span>`:'';return `<div class="tw" id="w${t.id}${todayKey}"><div class="del-bg">🗑</div><div class="tc2 ${cls}" id="c${t.id}${todayKey}" onclick="toggleToday('${t.id}')"><div class="chk"><svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M2.5 7L5.5 10L11.5 4" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="ti"><div class="tn">${t.name}</div>${nt}</div>${badge}</div></div>`;}
function toggleToday(id){const k=ck(id,todayKey);if(checks[k])delete checks[k];else checks[k]=todayKey;save();renderToday();}
function toggleCatOpen(freq){catOpen[freq]=catOpen[freq]===false?true:false;const isOpen=catOpen[freq]!==false;const b=document.getElementById('catbody-'+freq),a=document.getElementById('catarrow-'+freq);if(b){b.classList.toggle('open',isOpen);a.classList.toggle('open',isOpen);}}
function resetToday(){Object.keys(checks).filter(k=>k.endsWith('_'+todayKey)).forEach(k=>delete checks[k]);save();renderToday();}
function renderCal(){const fd=new Date(calYear,calMonth,1).getDay(),ld=new Date(calYear,calMonth+1,0).getDate();document.getElementById('calMonthLbl').textContent=`${calYear}年${calMonth+1}月`;let h='';['日','月','火','水','木','金','土'].forEach((d,i)=>{h+=`<div class="cal-dow${i===0?' sun':i===6?' sat':''}">${d}</div>`;});for(let i=0;i<fd;i++)h+=`<div class="cal-day empty"></div>`;for(let d=1;d<=ld;d++){const date=new Date(calYear,calMonth,d),dw=date.getDay(),key=dk(date);const isT=key===todayKey,isSel=key===calSelKey&&!isT;const active=tasks.filter(t=>isActiveOn(t,date));let on=false,late=false;active.forEach(t=>{const dd=getDoneDate(t.id,key);if(dd){if(dd===key)on=true;else late=true;}});let dots='';if(on)dots+=`<span class="dot d-done"></span>`;if(late)dots+=`<span class="dot d-late"></span>`;h+=`<div class="cal-day${dw===0?' sun-d':dw===6?' sat-d':''}${isT?' today-d':''}${isSel?' selected-d':''}" onclick="selectDay('${key}')"><span class="dnum">${d}</span><span class="dots">${dots}</span></div>`;}document.getElementById('calGrid').innerHTML=h;renderCalDetail(calSelKey);}
function selectDay(key){calSelKey=key;renderCal();}
function renderCalDetail(key){const d=parseKey(key),dw=d.getDay(),p=key.split('-');const active=tasks.filter(t=>isActiveOn(t,d));if(!active.length){document.getElementById('calDetail').innerHTML=`<div class="cal-detail"><div class="cal-dtitle">📅 ${p[1]}月${p[2]}日（${WD[dw]}）</div><div class="no-detail">この日の家事はありません</div></div>`;return;}let h=`<div class="cal-detail"><div class="cal-dtitle">📅 ${p[1]}月${p[2]}日（${WD[dw]}）</div><div class="cal-dsub">家事をタップ → 後からチェック（今日やったぶんとして記録されます）</div>`;active.forEach(t=>{const dd=getDoneDate(t.id,key),isDone=!!dd,isLate=isDone&&dd!==key,cat=getCat(t.freq);const chkCls=isLate?'lc':(isDone?'dc':'uc'),nameCls=isLate?'late-t':(isDone?'done-t':'');const lateNote=isLate?`<span class="late-note">→ 実際は${fmtKey(dd)}に実施</span>`:'';h+=`<div class="cal-row" onclick="toggleFromCal('${t.id}','${key}')"><div class="cchk ${chkCls}">${isDone?`<svg width="10" height="10" viewBox="0 0 14 14" fill="none"><path d="M2.5 7L5.5 10L11.5 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}</div><div class="ctname ${nameCls}">${t.name}${lateNote}</div><span class="cbadge" style="background:${cat.bg};color:${cat.col}">${cat.icon}</span></div>`;});h+='</div>';document.getElementById('calDetail').innerHTML=h;}
function toggleFromCal(id,scheduledKey){const k=ck(id,scheduledKey);if(checks[k])delete checks[k];else checks[k]=todayKey;save();renderCal();renderToday();}
function showActual(name,dateKey){document.getElementById('popupTitle').textContent=name;document.getElementById('popupText').textContent=`実際にやった日：${fmtKey(dateKey)}`;document.getElementById('popup').classList.add('open');}
function closePopup(){document.getElementById('popup').classList.remove('open');}
function renderMemo(){const el=document.getElementById('memoList');if(!memos.length){el.innerHTML=`<div class="memo-empty">📋<br>メモはまだありません</div>`;return;}el.innerHTML=[...memos].reverse().map(m=>`<div class="memo-card"><button class="memo-del" onclick="delMemo('${m.id}')">×</button><div class="memo-card-text">${esc(m.text)}</div>${m.url?`<div style="font-size:11px;color:var(--blue);margin-top:4px;text-decoration:underline">${m.url}</div>`:''}<div class="memo-card-date">${m.date}</div></div>`).join('');}
function addMemo(){const text=document.getElementById('memoText').value.trim(),url=document.getElementById('memoUrl').value.trim();if(!text&&!url)return;const d=new Date();memos.push({id:uid(),text,url,date:`${d.getMonth()+1}/${d.getDate()}`});save();document.getElementById('memoText').value='';document.getElementById('memoUrl').value='';renderMemo();}
function delMemo(id){memos=memos.filter(m=>m.id!==id);save();renderMemo();}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
document.querySelectorAll('.tab').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));b.classList.add('active');const pg=b.dataset.page;document.getElementById('page-'+pg).classList.add('active');document.getElementById('fabBtn').style.display=pg==='today'?'flex':'none';if(pg==='record')renderCal();if(pg==='memo')renderMemo();});});
function openSheet(){document.getElementById('ov').classList.add('open');document.getElementById('iName').value='';document.getElementById('iNote').value='';selFreq='daily';renderChips();}
function closeSheet(){document.getElementById('ov').classList.remove('open');}
function handleOv(e){if(e.target===document.getElementById('ov'))closeSheet();}
function renderChips(){document.getElementById('catChipGrid').innerHTML=ORDER.map(id=>{const c=getCat(id);return `<button class="cat-chip${id===selFreq?' sel':''}" onclick="selFreq='${id}';renderChips()"><span class="chip-icon">${c.icon}</span>${c.label.replace('の家事','').replace('毎月最終土曜','最終土').replace('３ヶ月ごと最終土曜','3M土')}</button>`}).join('');}
function addTask(){const n=document.getElementById('iName').value.trim();if(!n){document.getElementById('iName').style.borderColor='var(--acc)';setTimeout(()=>document.getElementById('iName').style.borderColor='',1200);return;}tasks.push({id:uid(),name:n,note:document.getElementById('iNote').value.trim(),freq:selFreq});save();closeSheet();renderToday();}
function initSwipe(){document.querySelectorAll('.tw').forEach(w=>{if(w._si)return;w._si=true;let sx=0,cx=0,dr=false;const c=w.querySelector('.tc2');w.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;dr=true;cx=0;},{passive:true});w.addEventListener('touchmove',e=>{if(!dr)return;cx=Math.min(0,e.touches[0].clientX-sx);c.style.transform=`translateX(${cx}px)`;c.style.transition='none';},{passive:true});w.addEventListener('touchend',()=>{if(!dr)return;dr=false;c.style.transition='';if(cx<-55){const id=c.id.slice(1).replace('_'+todayKey,'');c.style.transform='translateX(-100%)';setTimeout(()=>{tasks=tasks.filter(t=>t.id!==id);save();renderToday();},220);}else c.style.transform='translateX(0)';cx=0;});});}
load();renderToday();
</script>
</body>
</html>
